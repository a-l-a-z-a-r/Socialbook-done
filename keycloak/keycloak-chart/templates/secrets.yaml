apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-db-secret
type: Opaque
stringData:
  username: {{ .Values.keycloak.database.username | quote }}
  password: {{ .Values.keycloak.database.password | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin-secret
type: Opaque
stringData:
  username: {{ .Values.keycloak.adminUser | quote }}
  password: {{ .Values.keycloak.adminPassword | quote }}
