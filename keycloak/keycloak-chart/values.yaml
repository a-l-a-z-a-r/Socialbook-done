# PostgreSQL Database Configuration
postgres:
  storageClassName: "local-path"
  timezone: "Europe/Stockholm"
  user: "keycloak"
  password: "m7011e-klar"
  image: "postgres:16"
  resourceLimit: false
  cpu: "1000m"
  memory: "1000Mi"
  storage: "5Gi"

# Keycloak Configuration
keycloak:
  replicas: 1
  image: quay.io/keycloak/keycloak:23.0

  # Admin credentials (CHANGE THESE!)
  adminUser: admin
  adminPassword: m70011e-klar

  # Database configuration
  database:
    vendor: postgres
    host: postgres-service
    port: 5432
    database: keycloak
    username: keycloak
    password: m70011e-klar

  # Resource limits (optional)
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

service:
  port: 80
  targetPort: 8080

ingress:
  className: traefik
  tlsSecretName: keycloak-tls

domain: keycloak.example.com
email: your-email@example.com
certIssuer: letsencrypt-prod
