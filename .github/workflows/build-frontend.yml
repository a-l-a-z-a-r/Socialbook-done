name: Build frontend image

on:
  push:
    branches: ["Dev"]
    paths:
      - "frontend/**"
      - ".github/workflows/build-frontend.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set tag
        id: tag
        run: echo "tag=frontend-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: alazar111/socialbook-frontend:${{ steps.tag.outputs.tag }}

      - name: Image summary
        run: echo "Published alazar111/socialbook-frontend:${{ steps.tag.outputs.tag }}"
