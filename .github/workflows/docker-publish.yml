name: Build And Push Images

on:
  push:
    branches: [main]

env:
  REGISTRY_USER: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          push: true
          tags: |
            ${{ env.REGISTRY_USER }}/socialbook-backend:${{ github.sha }}
            ${{ env.REGISTRY_USER }}/socialbook-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./apps/frontend
          push: true
          tags: |
            ${{ env.REGISTRY_USER }}/socialbook-frontend:${{ github.sha }}
            ${{ env.REGISTRY_USER }}/socialbook-frontend:latest
