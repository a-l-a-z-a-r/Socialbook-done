name: Build and Push Images

on:
  push:
    branches:
      - Dev

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/socialbook-backend:backend-${{ github.sha }}
            ${{ env.DOCKERHUB_USERNAME }}/socialbook-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/socialbook-frontend:frontend-${{ github.sha }}
            ${{ env.DOCKERHUB_USERNAME }}/socialbook-frontend:latest

      - name: Build and push notifications worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/socialbook-notifications-worker:worker-${{ github.sha }}
            ${{ env.DOCKERHUB_USERNAME }}/socialbook-notifications-worker:latest

      - name: Update ArgoCD manifest image tags
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          version = "${{ github.sha }}"
          backend_repo = "${{ env.DOCKERHUB_USERNAME }}/socialbook-backend"
          frontend_repo = "${{ env.DOCKERHUB_USERNAME }}/socialbook-frontend"
          worker_repo = "${{ env.DOCKERHUB_USERNAME }}/socialbook-notifications-worker"
          backend_tag = f"backend-{version}"
          frontend_tag = f"frontend-{version}"
          worker_tag = f"worker-{version}"

          backend_values_files = [
              Path("helm/overrides/self-hosted/reviews-values.yaml"),
              Path("helm/overrides/self-hosted/users-values.yaml"),
              Path("helm/overrides/self-hosted/social-values.yaml"),
              Path("helm/overrides/self-hosted/notifications-values.yaml"),
              Path("helm/overrides/self-hosted/booklists-values.yaml"),
          ]

          def replace_or_append(pattern, replacement, text):
              if re.search(pattern, text, flags=re.MULTILINE):
                  return re.sub(pattern, replacement, text, flags=re.MULTILINE)
              return text.rstrip() + "\n" + replacement + "\n"

          for path in backend_values_files:
              data = path.read_text()
              data = re.sub(r'(?m)^(\s*repository:\s*).*$',
                            lambda m: f'{m.group(1)}{backend_repo}', data, count=1)
              data = re.sub(r'(?m)^(\s*tag:\s*).*$',
                            lambda m: f'{m.group(1)}{backend_tag}', data, count=1)
              path.write_text(data)

          frontend_path = Path("helm/overrides/self-hosted/frontend-values.yaml")
          frontend_values = frontend_path.read_text()
          frontend_values = re.sub(r'(?m)^(\s*repository:\s*).*$',
                                   lambda m: f'{m.group(1)}{frontend_repo}', frontend_values, count=1)
          frontend_values = re.sub(r'(?m)^(\s*tag:\s*).*$',
                                   lambda m: f'{m.group(1)}{frontend_tag}', frontend_values, count=1)
          frontend_values = replace_or_append(
              r'(?m)^rolloutId:.*$',
              f'rolloutId: "{version}"',
              frontend_values,
          )
          frontend_values = re.sub(
              r'(?m)^(\s*FRONTEND_IMAGE_TAG:\s*).*$',
              lambda m: f'{m.group(1)}"{frontend_tag}"',
              frontend_values,
          )
          frontend_path.write_text(frontend_values)

          worker_path = Path("helm/overrides/self-hosted/notifications-worker-values.yaml")
          worker_values = worker_path.read_text()
          worker_values = re.sub(r'(?m)^(\s*repository:\s*).*$',
                                 lambda m: f'{m.group(1)}{worker_repo}', worker_values, count=1)
          worker_values = re.sub(r'(?m)^(\s*tag:\s*).*$',
                                 lambda m: f'{m.group(1)}{worker_tag}', worker_values, count=1)
          worker_path.write_text(worker_values)
          PY

      - name: Commit manifest updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            helm/overrides/self-hosted/reviews-values.yaml \
            helm/overrides/self-hosted/users-values.yaml \
            helm/overrides/self-hosted/social-values.yaml \
            helm/overrides/self-hosted/notifications-values.yaml \
            helm/overrides/self-hosted/booklists-values.yaml \
            helm/overrides/self-hosted/frontend-values.yaml \
            helm/overrides/self-hosted/notifications-worker-values.yaml
          git commit -m "chore: bump images to ${{ github.sha }}" || exit 0
          git fetch origin Dev
          git pull --rebase origin Dev
          git push
