apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: socialbook
  namespace: socialbook
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - socialbook.ltu-m7011e-11.se
      secretName: socialbook-tls
  rules:
    - host: socialbook.ltu-m7011e-11.se
      http:
        paths:
          - path: /api/docs/reviews
            pathType: Prefix
            backend:
              service:
                name: socialbook-reviews
                port:
                  number: 5000
          - path: /api/docs/users
            pathType: Prefix
            backend:
              service:
                name: socialbook-users
                port:
                  number: 5000
