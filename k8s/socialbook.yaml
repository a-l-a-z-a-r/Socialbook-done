apiVersion: apps/v1
kind: Deployment
metadata:
  name: socialbook-reviews
  namespace: socialbook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: socialbook-reviews
  template:
    metadata:
      labels:
        app: socialbook-reviews
    spec:
      containers:
        - name: reviews
          image: alazar111/socialbook-backend:latest
          imagePullPolicy: Always
          command: ["node", "dist/apps/reviews/main.js"]
          ports:
            - containerPort: 5000
          env:
            - name: MONGODB_URI
              value: mongodb://socialbook-mongo-reviews:27017/reviews
            - name: KEYCLOAK_URL
              value: https://keycloak.ltu-m7011e-11.se
            - name: KEYCLOAK_REALM
              value: Userenter
            - name: RABBITMQ_URL
              value: amqp://admin:HelloWorld123@rabbitmq-service-api.rabbitmq.svc.cluster.local:5672
---
apiVersion: v1
