apiVersion: v1
kind: Namespace
metadata:
  name: socialbook
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: socialbook-mongo-reviews
  namespace: socialbook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: socialbook-mongo-reviews
  template:
    metadata:
      labels:
        app: socialbook-mongo-reviews
    spec:
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
      volumes:
        - name: mongo-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: socialbook-mongo-reviews
  namespace: socialbook
spec:
  selector:
    app: socialbook-mongo-reviews
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
---
