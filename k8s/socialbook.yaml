        app: socialbook-notifications-worker
    spec:
      containers:
        - name: notifications-worker
          image: alazar111/socialbook-notifications-worker:latest
          imagePullPolicy: Always
          env:
            - name: RABBITMQ_URL
              value: amqp://admin:HelloWorld123@rabbitmq-service-api.rabbitmq.svc.cluster.local:5672
            - name: RABBITMQ_EXCHANGE
              value: socialbook.events
            - name: RABBITMQ_QUEUE
              value: socialbook.notifications
            - name: RABBITMQ_ROUTING_KEY
              value: review.commented
            - name: NOTIFICATIONS_API_URL
              value: http://socialbook-notifications:5000/internal/notifications
