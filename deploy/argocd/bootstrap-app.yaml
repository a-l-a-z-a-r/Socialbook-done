apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: socialbook-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/a-l-a-z-a-r/Socialbook-done.git
    targetRevision: main
    path: deploy/argocd
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
