apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-dashboards
data:
  socialbook-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "panels": [
        {
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "id": 1,
          "targets": [
            { "expr": "sum(rate(http_requests_total[5m])) by (service)", "legendFormat": "{{ "{{service}}" }}", "refId": "A" }
          ],
          "title": "Request Rate",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "id": 2,
          "targets": [
            { "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service))", "legendFormat": "{{ "{{service}}" }} p95", "refId": "A" }
          ],
          "title": "Latency p95",
          "type": "timeseries"
        }
      ],
      "schemaVersion": 39,
      "style": "dark",
      "title": "Socialbook Overview",
      "version": 1
    }
